<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KANSAI COLLECTION — INVITATION</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Noto+Sans+JP:wght@100;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #050505; --white: #f5f5f0;
    --silver: #c8c8c8; --silver-bright: #e8e8e8; --gold: #d4af6a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--white); font-family:'Noto Sans JP',sans-serif; min-height:100vh; overflow-x:hidden; }

  /* INTRO */
  #intro { position:fixed; inset:0; background:var(--black); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; gap:28px; padding:40px 24px; }
  .intro-logo { font-family:'Cormorant Garamond',serif; font-size:clamp(26px,7vw,48px); font-weight:300; letter-spacing:0.3em; color:var(--silver-bright); text-align:center; opacity:0; animation:fadeUp 1s ease 0.3s forwards; }
  .intro-sub { font-size:9px; letter-spacing:0.5em; color:var(--silver); text-align:center; opacity:0; animation:fadeUp 1s ease 0.7s forwards; }
  .name-section { display:flex; flex-direction:column; align-items:center; gap:16px; width:100%; max-width:300px; opacity:0; animation:fadeUp 1s ease 1s forwards; }
  .name-label { font-size:9px; letter-spacing:0.5em; color:var(--silver); }
  .name-input { width:100%; background:transparent; border:none; border-bottom:1px solid var(--silver); padding:12px 4px; color:var(--white); font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; letter-spacing:0.15em; text-align:center; outline:none; transition:border-color 0.3s; }
  .name-input::placeholder { color:#444; }
  .name-input:focus { border-color:var(--silver-bright); }
  .start-btn { margin-top:8px; background:transparent; border:1px solid var(--silver); color:var(--silver-bright); font-family:'Noto Sans JP',sans-serif; font-size:10px; letter-spacing:0.5em; padding:14px 40px; cursor:pointer; transition:all 0.3s; position:relative; overflow:hidden; }
  .start-btn::before { content:''; position:absolute; inset:0; background:var(--silver); transform:scaleX(0); transform-origin:left; transition:transform 0.4s ease; }
  .start-btn:hover::before { transform:scaleX(1); }
  .start-btn:hover { color:var(--black); }
  .start-btn span { position:relative; z-index:1; }

  /* REVEAL */
  #reveal { display:none; position:fixed; inset:0; background:var(--black); z-index:50; overflow-y:auto; }
  .spotlight { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:0; height:0; border-radius:50%; background:radial-gradient(circle,rgba(200,200,200,0.1) 0%,transparent 70%); transition:width 1.8s ease,height 1.8s ease; pointer-events:none; }
  .spotlight.active { width:130vw; height:130vw; }
  .shimmer-frame { position:fixed; inset:16px; border:1px solid transparent; border-image:linear-gradient(180deg,var(--silver),transparent 40%,transparent 60%,var(--silver)) 1; pointer-events:none; opacity:0; transition:opacity 1s ease; z-index:10; }
  .shimmer-frame.visible { opacity:0.35; }
  .glitch-line { position:fixed; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--silver-bright),transparent); animation:scanline 4s linear infinite; opacity:0.12; pointer-events:none; z-index:300; }
  @keyframes scanline { 0%{top:0} 100%{top:100vh} }
  .stars { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
  .star { position:absolute; width:2px; height:2px; background:white; border-radius:50%; animation:twinkle var(--d) ease-in-out infinite; opacity:0; }
  @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--o)} }

  .reveal-content { position:relative; z-index:5; display:flex; flex-direction:column; align-items:center; text-align:center; padding:60px 28px 110px; min-height:100vh; justify-content:center; }

  .r-eyebrow { font-size:9px; letter-spacing:0.6em; color:var(--silver); opacity:0; transform:translateY(16px); margin-bottom:20px; }
  .r-kc-logo { font-family:'Cormorant Garamond',serif; font-size:clamp(32px,10vw,64px); font-weight:300; letter-spacing:0.28em; line-height:1.1; color:var(--white); opacity:0; transform:translateY(24px); margin-bottom:6px; }
  .r-kc-sub { font-size:9px; letter-spacing:0.55em; color:var(--silver); opacity:0; margin-bottom:40px; }
  .r-divider { width:0; height:1px; background:linear-gradient(90deg,transparent,var(--silver),transparent); margin-bottom:40px; transition:width 1s ease; }
  .r-invite-label { font-size:9px; letter-spacing:0.55em; color:var(--silver); opacity:0; transform:translateY(12px); margin-bottom:24px; }
  .r-name { font-family:'Cormorant Garamond',serif; font-size:clamp(44px,13vw,80px); font-weight:600; letter-spacing:0.08em; color:var(--white); opacity:0; transform:scale(0.85); line-height:1; text-shadow:0 0 80px rgba(200,200,200,0.25); margin-bottom:6px; }
  .r-name-san { font-size:10px; letter-spacing:0.45em; color:var(--silver); opacity:0; margin-bottom:48px; }
  .r-message { font-size:clamp(11px,3.2vw,13px); letter-spacing:0.3em; line-height:2.6; color:var(--silver-bright); opacity:0; transform:translateY(10px); margin-bottom:52px; }

  .r-models-wrap { display:flex; flex-direction:column; align-items:center; opacity:0; transform:translateY(16px); margin-bottom:48px; }
  .r-models-label { font-size:8px; letter-spacing:0.6em; color:var(--silver); margin-bottom:24px; }
  .r-models { display:flex; gap:28px; align-items:center; justify-content:center; flex-wrap:wrap; }
  .r-model-card { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .r-model-icon { width:88px; height:88px; border:1px solid rgba(200,200,200,0.3); border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--silver); background:rgba(255,255,255,0.02); box-shadow:0 0 24px rgba(200,200,200,0.1); }
  .r-model-name { font-family:'Cormorant Garamond',serif; font-size:clamp(15px,4vw,20px); font-weight:300; letter-spacing:0.18em; color:var(--white); }
  .r-model-name-ja { font-size:9px; letter-spacing:0.35em; color:var(--silver); }
  .r-model-sep { font-family:'Cormorant Garamond',serif; font-size:28px; color:rgba(200,200,200,0.2); font-style:italic; padding-top:8px; }

  .r-venue { display:flex; flex-direction:column; align-items:center; gap:12px; opacity:0; transform:translateY(12px); }
  .r-venue-label { font-size:8px; letter-spacing:0.6em; color:var(--silver); }
  .r-venue-divider { width:40px; height:1px; background:linear-gradient(90deg,transparent,var(--silver),transparent); }
  .r-venue-date { font-family:'Cormorant Garamond',serif; font-size:clamp(16px,4.5vw,22px); font-weight:300; letter-spacing:0.3em; color:var(--white); }
  .r-venue-place { font-size:10px; letter-spacing:0.4em; color:var(--silver); }

  .seal { position:fixed; bottom:52px; right:28px; width:60px; height:60px; opacity:0; z-index:20; }
  .seal svg { width:100%; height:100%; }
  .share-btn { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:transparent; border:1px solid rgba(200,200,200,0.3); color:var(--silver); font-family:'Noto Sans JP',sans-serif; font-size:9px; letter-spacing:0.5em; padding:11px 28px; cursor:pointer; opacity:0; transition:all 0.3s; z-index:500; white-space:nowrap; }
  .share-btn:hover { border-color:var(--silver-bright); color:var(--white); }
  .share-message { position:fixed; bottom:62px; left:50%; transform:translateX(-50%); font-size:12px; letter-spacing:0.35em; color:var(--silver-bright); opacity:0; transition:opacity 0.8s; z-index:500; white-space:nowrap; }
  #confetti-canvas { position:fixed; inset:0; pointer-events:none; z-index:200; }

  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
  @keyframes scaleIn { to { opacity:1; transform:scale(1); } }
  @keyframes fadeIn { to { opacity:1; transform:translateY(0); } }

  /* FLASH / GLITCH */
  #flash-overlay { position:fixed; inset:0; z-index:400; pointer-events:none; background:white; opacity:0; }
  .r-name.glitching {
    animation: nameGlitch 0.65s steps(1) forwards !important;
  }
  @keyframes nameGlitch {
    0%   { opacity:1; transform:scale(1) translate(0,0);   color:#fff; }
    10%  { transform:scale(1.03) translate(-4px,2px);      clip-path:inset(20% 0 30% 0); color:#e8e8e8; text-shadow:5px 0 0 rgba(160,200,255,0.9),-5px 0 0 rgba(255,160,160,0.9); }
    20%  { transform:scale(1) translate(6px,-3px);         clip-path:inset(55% 0 8% 0);  color:#fff; text-shadow:-6px 0 0 rgba(160,200,255,0.7); }
    30%  { transform:scale(1.05) translate(-2px,0);        clip-path:inset(0 0 0 0);     color:#ddeeff; text-shadow:0 0 50px rgba(255,255,255,1); }
    40%  { transform:scale(1) translate(4px,2px);          clip-path:inset(10% 0 65% 0); color:#fff; }
    55%  { transform:scale(1.01) translate(0,0);           clip-path:inset(0 0 0 0);     color:#fff; text-shadow:0 0 70px rgba(220,220,255,0.9); }
    70%  { transform:scale(1) translate(-2px,-1px);        color:#e8e8e8; }
    100% { transform:scale(1) translate(0,0); opacity:1;  color:var(--white); text-shadow:0 0 80px rgba(200,200,200,0.25); clip-path:none; }
  }
  @keyframes flashIn { 0%{opacity:0.85} 40%{opacity:0.3} 70%{opacity:0.6} 100%{opacity:0} }
</style>
</head>
<body>

<div class="glitch-line"></div>
<div class="shimmer-frame" id="shimmerFrame"></div>
<div class="stars" id="stars"></div>
<canvas id="confetti-canvas"></canvas>
<div id="flash-overlay"></div>

<div id="intro">
  <div class="intro-logo">KANSAI<br>COLLECTION</div>
  <div class="intro-sub">2026 AUTUMN / WINTER</div>
  <div class="name-section">

<div class="share-message" id="shareMessage">LINEグループにシェアで、チケットプレゼント。</div>
<button class="share-btn" id="shareBtn" onclick="shareScreen()">✦ SHARE ✦</button>

<script>
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--o:${0.2+Math.random()*0.4};animation-delay:${Math.random()*5}s;`;
  starsEl.appendChild(s);
}

const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let pieces = [], confettiActive = false;
const colors = ['#e8e8e8','#c8c8c8','#d4af6a','#ffffff','#a0a8b8','#f0f0f0','#c0b8d0'];

function spawnConfetti(n = 40) {
  for (let i = 0; i < n; i++) {
    pieces.push({
      x: Math.random()*canvas.width, y:-20,
      w:4+Math.random()*8, h:2+Math.random()*5,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360, rotV:(Math.random()-0.5)*7,
      vx:(Math.random()-0.5)*4, vy:2+Math.random()*4,
      op:0.85+Math.random()*0.15,
      shape:Math.random()>0.4?'rect':'circle'
    });
  }
}

function drawConfetti() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces = pieces.filter(p => p.y < canvas.height+40 && p.op > 0.04);
  pieces.forEach(p => {
    p.y+=p.vy; p.x+=p.vx; p.rot+=p.rotV; p.vy+=0.06;
    if (p.y > canvas.height*0.55) p.op -= 0.007;
    ctx.save();
    ctx.globalAlpha = p.op;
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot*Math.PI/180);
    ctx.fillStyle = p.color;
    if (p.shape==='rect') ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    else { ctx.beginPath(); ctx.arc(0,0,p.w/2,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });
  if (confettiActive || pieces.length>0) requestAnimationFrame(drawConfetti);
}

function startConfetti() {
  confettiActive = true;
  for (let i=0; i<6; i++) setTimeout(()=>spawnConfetti(70), i*180);
  const iv = setInterval(()=>spawnConfetti(25), 350);
  setTimeout(()=>{ confettiActive=false; clearInterval(iv); }, 5500);
  drawConfetti();
}

function startReveal() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) {
    const inp = document.getElementById('nameInput');
    inp.focus(); inp.style.borderColor='#666';
    setTimeout(()=>inp.style.borderColor='var(--silver)', 800);
    return;
  }
  document.getElementById('r5').textContent = name;
  const intro = document.getElementById('intro');
  intro.style.transition = 'opacity 0.6s ease';
  intro.style.opacity = '0';
  setTimeout(()=>{ intro.style.display='none'; playReveal(); }, 600);
}

function playReveal() {
  document.getElementById('reveal').style.display = 'block';
  setTimeout(()=>document.getElementById('spotlight').classList.add('active'), 100);
  setTimeout(()=>document.getElementById('shimmerFrame').classList.add('visible'), 600);

  const seq = [
    {id:'r1',   delay:500,  anim:'fadeUp 0.8s ease forwards'},
    {id:'r2',   delay:800,  anim:'fadeUp 0.9s ease forwards'},
    {id:'r3',   delay:1200, anim:'fadeIn 0.8s ease forwards'},
    {id:'divider', delay:1500, width:'220px'},
    {id:'r4',   delay:1900, anim:'fadeIn 0.8s ease forwards'},
    {id:'r5',   delay:2400, anim:'scaleIn 0.9s cubic-bezier(0.16,1,0.3,1) forwards'},
    {id:'r6',   delay:3000, anim:'fadeIn 0.6s ease forwards'},
    {id:'r7',   delay:3400, anim:'fadeIn 0.9s ease forwards'},
    {id:'r8',   delay:4000, anim:'fadeIn 0.9s ease forwards'},
    {id:'r9',   delay:4600, anim:'fadeIn 0.8s ease forwards'},
    {id:'seal', delay:5100, anim:'fadeIn 1s ease forwards'},
  ];

  seq.forEach(item=>{
    setTimeout(()=>{
      const el = document.getElementById(item.id);
      if (!el) return;
      if (item.width) el.style.width = item.width;
      else el.style.animation = item.anim;
    }, item.delay);
  });

  setTimeout(()=>startConfetti(), 2400);
  // グリッチ＆フラッシュ
  setTimeout(()=>triggerNameGlitch(), 2400);
  setTimeout(()=>{
    const btn = document.getElementById('shareBtn');
    const msg = document.getElementById('shareMessage');
    btn.style.transition = 'opacity 0.8s';
    btn.style.opacity = '1';
    msg.style.opacity = '1';
  }, 5600);
}

document.getElementById('nameInput').addEventListener('keydown', e=>{
  if (e.key==='Enter') startReveal();
});

function triggerNameGlitch() {
  const nameEl = document.getElementById('r5');
  const flash  = document.getElementById('flash-overlay');
  // フラッシュ
  flash.style.animation = 'none';
  flash.offsetHeight; // reflow
  flash.style.animation = 'flashIn 0.5s ease forwards';
  // グリッチ
  nameEl.classList.remove('glitching');
  nameEl.offsetHeight;
  nameEl.classList.add('glitching');
  setTimeout(()=>nameEl.classList.remove('glitching'), 700);
}

function shareScreen() {
  const name = document.getElementById('r5').textContent || '';
  const text = `🖤 ${name}様\n\n西山大智・青木こるより、関西コレクション 2026 A/W へのご招待状が届いています。\n\n#KANSAICOLLECTION #KansaiCollection2026`;
  if (navigator.share) {
    navigator.share({text});
  } else {
    navigator.clipboard.writeText(text).then(()=>{
      const btn = document.getElementById('shareBtn');
      btn.textContent = '✓ COPIED';
      setTimeout(()=>btn.textContent='✦ SHARE ✦', 2000);
    });
  }
}
</script>
